<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Em Dash Cleaner</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>Em Dash Cleaner</h1>
    <p class="hint">
      Type <code>/clear-emdash</code> followed by <kbd>Space</kbd> or <kbd>Enter</kbd>
      in any input, or press <kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>E</kbd>.
    </p>
  </header>

  <fieldset>
    <legend>Replace em dashes (—) with</legend>
    <label><input type="radio" name="replacement" value="remove"> Nothing (remove)</label>
    <label><input type="radio" name="replacement" value="hyphen"> A hyphen <span class="ex">-</span></label>
    <label><input type="radio" name="replacement" value="comma"> Comma + space <span class="ex">, </span></label>
    <label><input type="radio" name="replacement" value="spaced"> Spaced hyphen <span class="ex"> - </span></label>
  </fieldset>

  <label class="toggle">
    <input type="checkbox" id="includeEnDash">
    <span>Also clean en dashes (–)</span>
  </label>

  <label class="toggle">
    <input type="checkbox" id="autoReplace">
    <span>Auto-replace as I type <em>(no command needed)</em></span>
  </label>

  <label class="toggle">
    <input type="checkbox" id="showToast">
    <span>Show small confirmation toast</span>
  </label>

  <p class="footer">
    Other triggers: <code>/clear-em</code>, <code>/noem</code>.<br>
    Change the shortcut at <code>chrome://extensions/shortcuts</code>.
  </p>

  <script src="popup.js"></script>
</body>
</html>
